name: Weekly Security Audit

on:
  schedule:
    - cron: '0 6 * * 1'   # Every Monday 06:00 UTC
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  audit:
    name: Dependency security audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      # ── npm audit ────────────────────────────────────────────────────────
      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: npm

      - run: npm ci --silent

      - name: npm security audit
        id: npm
        run: |
          REPORT=$(npm audit 2>&1) || true
          STATUS=$?
          {
            echo "report<<NPMEOF"
            echo "$REPORT"
            echo "NPMEOF"
            echo "has_vulns=$([ $STATUS -ne 0 ] && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"

      # ── Python audit (pip-audit via uv) ──────────────────────────────────
      - uses: astral-sh/setup-uv@v7
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Sync Python dev dependencies
        run: uv sync --quiet

      - name: Export locked requirements for audit
        run: uv export --format requirements-txt --no-hashes --output-file /tmp/reqs.txt

      - name: Python security audit (pip-audit)
        id: py
        run: |
          pip install pip-audit --quiet
          REPORT=$(pip-audit -r /tmp/reqs.txt --format columns 2>&1) || true
          STATUS=$?
          {
            echo "report<<PYEOF"
            echo "$REPORT"
            echo "PYEOF"
            echo "has_vulns=$([ $STATUS -ne 0 ] && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"

      # ── Rust audit (cargo-audit) ─────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo-audit binary
        uses: actions/cache@v4
        with:
          path: ~/.cargo/bin/cargo-audit
          key: cargo-audit-${{ runner.os }}

      - name: Install cargo-audit
        run: which cargo-audit 2>/dev/null || cargo install cargo-audit

      - name: Rust security audit (cargo-audit)
        id: cargo
        run: |
          REPORT=$(cargo audit --manifest-path src-tauri/Cargo.toml 2>&1) || true
          STATUS=$?
          {
            echo "report<<CARGOEOF"
            echo "$REPORT"
            echo "CARGOEOF"
            echo "has_vulns=$([ $STATUS -ne 0 ] && echo true || echo false)"
          } >> "$GITHUB_OUTPUT"

      # ── Step summary ──────────────────────────────────────────────────────
      - name: Write step summary
        env:
          NPM_REPORT: ${{ steps.npm.outputs.report }}
          PY_REPORT: ${{ steps.py.outputs.report }}
          CARGO_REPORT: ${{ steps.cargo.outputs.report }}
        run: |
          {
            echo "## Weekly Security Audit — $(date -I)"
            echo ""
            echo "### npm audit"
            echo '```'
            printf '%s\n' "$NPM_REPORT"
            echo '```'
            echo ""
            echo "### Python (pip-audit)"
            echo '```'
            printf '%s\n' "$PY_REPORT"
            echo '```'
            echo ""
            echo "### Rust (cargo-audit)"
            echo '```'
            printf '%s\n' "$CARGO_REPORT"
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      # ── Create / update issue if vulnerabilities found ────────────────────
      - name: Open or update security issue
        if: >
          steps.npm.outputs.has_vulns == 'true' ||
          steps.py.outputs.has_vulns == 'true' ||
          steps.cargo.outputs.has_vulns == 'true'
        uses: actions/github-script@v7
        env:
          NPM_REPORT: ${{ steps.npm.outputs.report }}
          PY_REPORT: ${{ steps.py.outputs.report }}
          CARGO_REPORT: ${{ steps.cargo.outputs.report }}
        with:
          script: |
            const date = new Date().toISOString().slice(0, 10);
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const title = `[Security] Vulnerabilities detected – ${date}`;
            const body = [
              `## Weekly Security Audit — ${date}`,
              ``,
              `Triggered by [workflow run](${runUrl}).`,
              ``,
              `### npm audit`,
              `\`\`\``,
              process.env.NPM_REPORT || '(no output)',
              `\`\`\``,
              ``,
              `### Python (pip-audit)`,
              `\`\`\``,
              process.env.PY_REPORT || '(no output)',
              `\`\`\``,
              ``,
              `### Rust (cargo-audit)`,
              `\`\`\``,
              process.env.CARGO_REPORT || '(no output)',
              `\`\`\``,
              ``,
              `_Review and address **high** or **critical** severity items._`,
              `_Close this issue once all findings are resolved._`,
            ].join('\n');

            const { data: open } = await github.rest.issues.listForRepo({
              ...context.repo,
              labels: 'security-audit',
              state: 'open',
            });

            if (open.length > 0) {
              await github.rest.issues.update({
                ...context.repo,
                issue_number: open[0].number,
                title,
                body,
              });
              core.info(`Updated existing issue #${open[0].number}`);
            } else {
              const { data: issue } = await github.rest.issues.create({
                ...context.repo,
                title,
                body,
                labels: ['security-audit', 'maintenance'],
              });
              core.info(`Created issue #${issue.number}`);
            }
